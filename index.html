<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mini IT Ticket System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Mini IT Ticket System</h1>

    <form id="ticketForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="text" id="problem" placeholder="Describe the problem..." required>
        <button type="submit">Submit Ticket</button>
    </form>

    <h2>Tickets</h2>

    <table id="ticketTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Problem</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Tickets appear here -->
        </tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
