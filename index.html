<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini IT Ticket System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Mini IT Ticketsystem</h1>
    </header>

    <main>
        <section class="form-section">
            <h2>Neues Ticket erstellen</h2>
            <form id="ticketForm">
                <label for="name">Name:</label>
                <input type="text" id="name" required>

                <label for="issue">Problem:</label>
                <textarea id="issue" rows="4" required></textarea>

                <button type="submit">Ticket absenden</button>
            </form>
            <p id="message"></p>
        </section>

        <section class="tickets-section">
            <h2>Tickets</h2>
            <table id="ticketsTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Problem</th>
                        <th>Status</th>
                        <th>Aktion</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Tickets erscheinen hier -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
