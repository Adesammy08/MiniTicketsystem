<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini IT Ticket System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Mini IT Ticket System</h1>

    <form id="ticketForm">
        <label>Name:</label>
        <input type="text" id="name" required>
        <br>
        <label>Problem:</label>
        <input type="text" id="problem" required>
        <br>
        <button type="submit">Submit Ticket</button>
    </form>

    <h2>Submitted Tickets</h2>
    <table id="ticketTable" border="1">
        <thead>
            <tr>
                <th>Name</th>
                <th>Problem</th>
            </tr>
        </thead>
        <tbody>
            <!-- Tickets will appear here -->
        </tbody>
    </table>

    <script src="script.js"></script>
</body>
</html>
